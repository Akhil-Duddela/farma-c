<div class="auth-wrap">
  <div class="card">
    <h1>Create account</h1>
    <p class="muted">Start automating your farm brand on Instagram</p>
    <form [formGroup]="form" (ngSubmit)="submit()">
      <label>Name</label>
      <input type="text" formControlName="name" />
      <label>Email</label>
      <input type="email" formControlName="email" autocomplete="username" />
      <label>Password</label>
      <input type="password" formControlName="password" autocomplete="new-password" />
      @if (captchaEnabled) {
        <div class="mt-2">
          <span class="small muted d-block mb-1">Security check</span>
          <div #captchaBox class="hcaptcha-box"></div>
        </div>
      }
      @if (error) {
        <div class="alert">{{ error }}</div>
      }
      <button class="btn primary" type="submit" [disabled]="loading || form.invalid">
        {{ loading ? 'Creating…' : 'Create account' }}
      </button>
    </form>
    <p class="muted small">Already have an account? <a routerLink="/login">Sign in</a></p>
  </div>
</div>
