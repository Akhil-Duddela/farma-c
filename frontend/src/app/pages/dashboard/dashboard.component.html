<div class="dashboard-hero text-white mb-4">
  <div class="container-fluid">
    <div class="d-flex flex-wrap align-items-end justify-content-between gap-2 py-4">
      <div>
        <h1 class="h2 mb-1">Farm-C AI</h1>
        <p class="mb-0 text-white-50">Create, schedule, and track posts across Instagram &amp; YouTube</p>
      </div>
      <div class="d-flex flex-wrap gap-2 small">
        <span class="stat-pill"
          >Likes <strong class="ms-1">{{ summary.totals?.likes ?? 0 }}</strong></span
        >
        <span class="stat-pill"
          >Reach <strong class="ms-1">{{ summary.totals?.reach ?? 0 }}</strong></span
        >
        <span class="stat-pill"
          >Impr. <strong class="ms-1">{{ summary.totals?.impressions ?? 0 }}</strong></span
        >
      </div>
    </div>
  </div>
</div>

<div class="container-fluid px-2 px-sm-3 pb-5">
  <div class="row g-4">
    <div class="col-12 col-xl-8 d-flex flex-column">
      <app-accounts-card (connected)="onAccountsChange()" />
      <app-create-post-card (postCreated)="onPostCreated()" />
    </div>
    <div class="col-12 col-xl-4 d-flex">
      <app-logs-error-panel
        class="w-100"
        [refresh]="refreshTick"
        (retryId)="onLogRetryRequest($event)"
      />
    </div>
  </div>
  <div class="row g-3 mt-1">
    <div class="col-12">
      <app-post-status-table
        [refresh]="refreshTick"
        [showVideos]="true"
        (dataChanged)="onPostDataChanged()"
      />
    </div>
  </div>
</div>
