<div class="layout">
  <aside class="sidebar">
    <div class="brand">
      <span class="brand-mark">🌾</span>
      <div>
        <div class="brand-title">Farm-C AI</div>
        <div class="brand-sub">Multi-platform</div>
      </div>
    </div>
    <nav class="nav">
      <a routerLink="/dashboard" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }"
        >Dashboard</a
      >
      <a routerLink="/posts" routerLinkActive="active">All posts</a>
      <a routerLink="/calendar" routerLinkActive="active">Schedule</a>
      <a routerLink="/analytics" routerLinkActive="active">Analytics</a>
      <a routerLink="/logs" routerLinkActive="active">Logs</a>
      <a routerLink="/settings" routerLinkActive="active">Settings</a>
    </nav>
    <button type="button" class="btn ghost" (click)="logout()">Sign out</button>
  </aside>
  <main class="main">
    <router-outlet />
  </main>
</div>
