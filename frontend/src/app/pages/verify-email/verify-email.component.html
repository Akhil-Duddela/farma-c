<div class="container py-5" style="max-width: 28rem">
  <div class="card border-0 shadow-sm">
    <div class="card-body p-4 text-center">
      @if (state === 'loading') {
        <p class="text-muted mb-0">Verifying your email…</p>
        <div class="spinner-border text-primary mt-3" role="status" aria-label="Loading"></div>
      }
      @if (state === 'ok') {
        <h1 class="h4 mb-2">Email verified</h1>
        <p class="text-muted small mb-3">You can sign in and continue setup (phone and profile) in the app.</p>
        <a routerLink="/login" class="btn btn-primary">Sign in</a>
      }
      @if (state === 'err') {
        <h1 class="h4 mb-2 text-danger">Could not verify</h1>
        <p class="text-muted small mb-3">{{ errMessage }}</p>
        <a routerLink="/login" class="btn btn-outline-primary">Sign in</a>
      }
    </div>
  </div>
</div>
