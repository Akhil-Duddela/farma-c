<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="Farm-C AI">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2f5d3a"/>
      <stop offset="100%" style="stop-color:#1a3d24"/>
    </linearGradient>
  </defs>
  <!-- Rounded field / badge -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- Sun / yolk hint -->
  <circle cx="400" cy="120" r="40" fill="#f4c430" opacity="0.9"/>
  <!-- Simple chicken: body -->
  <ellipse cx="256" cy="300" rx="120" ry="100" fill="#f0a020"/>
  <ellipse cx="256" cy="300" rx="100" ry="88" fill="#f5b82e"/>
  <!-- Head -->
  <circle cx="256" cy="170" r="72" fill="#ffda63"/>
  <!-- Beak -->
  <path d="M300 200 L360 220 L300 250 Z" fill="#e86a1a"/>
  <!-- Comb -->
  <path d="M200 120 Q220 60 240 100 Q256 50 272 100 Q292 60 312 120 L300 150 Q256 130 200 150 Z" fill="#c23b3b"/>
  <!-- Eye -->
  <circle cx="230" cy="160" r="10" fill="#1f2a24"/>
  <circle cx="233" cy="157" r="3" fill="#fff"/>
  <!-- Wing hint -->
  <path d="M180 280 Q150 320 200 360 Q220 300 200 260 Z" fill="#d9950e" opacity="0.85"/>
  <!-- Ground line -->
  <rect x="64" y="420" width="384" height="12" rx="6" fill="#4a7a52" opacity="0.5"/>
